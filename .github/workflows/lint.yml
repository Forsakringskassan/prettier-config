name: Lint

on: [push, pull_request]

permissions:
    contents: read

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js 22.x
              uses: actions/setup-node@v6
              with:
                  node-version: 22.x
            - name: Install dependencies
              run: npm ci
            - name: Build
              run: npm run build
            - name: Prettier
              uses: ./
            - name: ESLint
              if: success() || failure()
              uses: Forsakringskassan/eslint-config@e1b0f1f713223dbe84b0e7d09c94a1a5e2a8851c # v15.0.1
