name: Lint

on: [push, pull_request]

permissions:
    contents: read

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js 22.x
              uses: actions/setup-node@v6
              with:
                  node-version: 22.x
            - name: Install dependencies
              run: npm ci
            - name: Build
              run: npm run build
            - name: Prettier
              uses: ./
            - name: ESLint
              if: success() || failure()
              uses: Forsakringskassan/eslint-config@f1f31e00335d0038f7be1751121b2fb71c61eb81 # v14.2.2
