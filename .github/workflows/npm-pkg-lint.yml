name: npm-pkg-lint

on: [push, pull_request]

permissions:
    contents: read

jobs:
    npm-pkg-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            - name: Use Node.js
              uses: actions/setup-node@v6
            - name: Install Dependencies
              run: npm ci
            - name: npm-pkg-lint
              uses: ext/npm-pkg-lint@e9d1941bd43a0e086df25f4be2d512ba0e2bb8eb # v5.1.9
              with:
                  folders: packages/*
                  allow-dependencies: prettier,vue
