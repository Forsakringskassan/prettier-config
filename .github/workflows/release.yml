name: Release

on:
    workflow_dispatch:
    schedule:
        - cron: "0 0 * * 5"

permissions:
    contents: write
    issues: write
    pull-requests: write
    id-token: write

jobs:
    release:
        uses: Forsakringskassan/.github/.github/workflows/lib-npm-release.yml@feature/npm-release
        with:
            app-id: ${{ vars.RELEASE_APP_ID }}
        secrets:
            app-key: ${{ secrets.RELEASE_APP_KEY }}
